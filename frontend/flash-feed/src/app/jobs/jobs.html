<div class="jobs-container">

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab" [class.active]="selectedTab === 'govt'" (click)="selectTab('govt')">
      🏛 Govt
    </div>

    <div class="tab" [class.active]="selectedTab === 'private'" (click)="selectTab('private')">
      💼 Private
    </div>

    <div class="tab" [class.active]="selectedTab === 'news'" (click)="selectTab('news')">
      📰 News
    </div>
  </div>

  <div class="jobs-body">

    <!-- Govt Jobs -->
    <ng-container *ngIf="selectedTab === 'govt'">
      <div class="job-card" *ngFor="let job of govtJobs" (click)="openJob(job.applyLink)">

        <div class="job-title">{{ job.title }}</div>

        <div class="job-info">
          🎓 {{ job.qualification }}
        </div>

        <div class="job-info">
          ⏰ Last Date: {{ job.lastDate }}
        </div>

      </div>
    </ng-container>


    <!-- Private Jobs -->
    <ng-container *ngIf="selectedTab === 'private'">
      <div class="job-card" *ngFor="let job of privateJobs" (click)="openJob(job.applyLink)">

        <div class="job-title">{{ job.title }}</div>

        <div class="job-info">
          🎓 {{ job.qualification }}
        </div>

        <div class="job-info">
          ⏰ Last Date: {{ job.lastDate }}
        </div>

      </div>
    </ng-container>


    <!-- Job News -->
    <ng-container *ngIf="selectedTab === 'news'">
      <div class="news-card" *ngFor="let news of jobNews" (click)="openJob(news.applyLink)">

        <img [src]="news.imageUrl" class="news-image">

        <div class="news-body">
          <div class="news-title">{{ news.title }}</div>
          <div class="news-summary">{{ news.summary }}</div>
        </div>
      </div>
    </ng-container>

    <!-- Empty -->
    <div *ngIf="getCurrentList().length === 0" class="empty-state">
      No jobs available
    </div>

  </div>

</div>
