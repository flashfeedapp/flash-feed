<div class="videos-wrapper">
  <div class="video-grid">
    <div class="video-card" *ngFor="let v of videos" (click)="playVideo(v.id.videoId)">
      
      <img [src]="v.snippet.thumbnails.high.url" class="thumb">

      <div class="info">
        <h3 class="title">{{ v.snippet.title }}</h3>
        <p class="channel">{{ v.snippet.channelTitle }}</p>
        <p class="date">{{ v.snippet.publishedAt | date:'medium' }}</p>
      </div>

    </div>
  </div>

  <!-- Popup Player -->
  <div class="player-overlay" *ngIf="selectedVideoId" (click)="closePlayer()">
    <div class="player-small" (click)="$event.stopPropagation()">
      <iframe [src]="sanitizedVideoUrl" allowfullscreen></iframe>
    </div>
  </div>
</div>
