<!-- SPLASH SCREEN -->
<div *ngIf="showSplash" class="splash-screen">

  <img [src]="'/images/bird7.png'" class="splash-logo">

</div>

<div *ngIf="!showSplash" [class.dark]="showDarkMode" class="global-container">
  <header class="header">
    <div class="title">News Birdy</div>
  </header>

  <!-- 🔵 PAGE CONTENT GOES HERE -->
  <main class="content-area">
    <router-outlet></router-outlet>
  </main>


  <div class="bottom-nav" *ngIf="isPreferencesCompleted()">

    <div class="fab-container">

      <button class="fab-main" (click)="toggleBottomNav()">
        {{ showBottomNav ? '✕' : '☰' }}
      </button>

      <div class="fab-menu" [class.show]="showBottomNav">
        <button (click)="navigateAndClose('/home')">🏠 Home</button>
        <button (click)="navigateAndClose('/settings')">⚙️ Settings</button>
      </div>
    </div>

    <button class="nav-item" [class.disabled]="!isPreferencesCompleted()" routerLink="/news" routerLinkActive="active">

      <span class="icon">📰</span>
      <span class="label">News</span>

    </button>

    <button class="nav-item" [class.disabled]="!isPreferencesCompleted()" routerLink="/jobs" routerLinkActive="active">

      <span class="icon">💼</span>
      <span class="label">Jobs</span>

    </button>

    <button class="nav-item" [class.disabled]="!isPreferencesCompleted()" routerLink="/facts" routerLinkActive="active">

      <span class="icon">💡</span>
      <span class="label">Facts</span>

    </button>

    <button class="nav-item" [class.disabled]="!isPreferencesCompleted()" routerLink="/stories" routerLinkActive="active">

      <span class="icon">📚</span>
      <span class="label">Stories</span>

    </button>

  </div>

</div>
